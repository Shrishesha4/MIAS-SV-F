version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mias
      POSTGRES_PASSWORD: mias_secret
      POSTGRES_DB: mias_mp
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mias -d mias_mp"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://mias:mias_secret@db:5432/mias_mp
      JWT_SECRET_KEY: mias-super-secret-jwt-key-change-in-production-256bit
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
