worker_processes 20;         # match CPU cores exactly
worker_rlimit_nofile 131072; # 2× worker_connections per worker

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Performance ---
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    keepalive_requests 10000;

    # --- Buffers (tuned for API + file upload traffic) ---
    client_max_body_size    50M;
    client_body_buffer_size 1M;
    proxy_buffer_size       16k;
    proxy_buffers           8 32k;
    proxy_busy_buffers_size 64k;

    # --- Compression ---
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   4;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain
        application/json
        application/javascript
        text/css
        text/xml
        application/xml+rss;

    # --- Logging (structured for prod) ---
    log_format main '$remote_addr - $request_time s "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main buffer=64k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # --- Rate limiting zones ---
    # Per-IP: 200 req/s sustained, burst 1000 (covers page loads with many sub-requests)
    limit_req_zone $binary_remote_addr zone=api_ip:20m   rate=200r/s;
    # Global cap: 5000 req/s across all clients
    limit_req_zone $server_name        zone=api_global:5m rate=5000r/s;

    # --- Upstream (41 Gunicorn workers via HTTP/1.1 keepalive) ---
    upstream backend {
        server backend:8000;
        keepalive 256;         # persistent connections to backend pool
        keepalive_requests 10000;
        keepalive_timeout  60s;
    }

    server {
        listen 8001;
        server_tokens off;
        # --- Security headers ---
        add_header X-Content-Type-Options    "nosniff"                        always;
        add_header X-Frame-Options           "DENY"                           always;
        add_header X-XSS-Protection          "1; mode=block"                  always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff;
            access_log off;

            # Allow large file reads from SSD
            sendfile on;
            aio      on;
            directio 4m;
        }

        # --- API traffic ---
        location /api/ {
            limit_req zone=api_ip     burst=500  nodelay;
            limit_req zone=api_global burst=2000 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # --- Health check (no rate limiting, no logging) ---
        location /health {
            proxy_pass http://backend;
            access_log off;
        }
    }
}
