[databases]
mias_mp = host=db port=5432 dbname=mias_mp

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; transaction mode — best for async SQLAlchemy / Starlette
pool_mode = transaction

; 41 workers × 20 max pool = 820 app-side conns → 2000 client slots gives ample headroom
max_client_conn = 2000
; 150 real DB connections — 20-core PG can serve well beyond this
default_pool_size = 150
reserve_pool_size = 30
reserve_pool_timeout = 3

server_idle_timeout = 600
client_idle_timeout = 120
server_reset_query = DISCARD ALL
; Run reset query after every transaction (not just session release).
; Required for transaction mode to discard prepared statements between clients.
server_reset_query_always = 1
server_lifetime = 3600

; tuning for high-throughput async workload
query_wait_timeout = 10
cancel_wait_timeout = 10

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
